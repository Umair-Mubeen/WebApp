<script>
    // Add search functionality
    document.getElementById('tableSearch').addEventListener('keyup', function() {
        const searchTerm = this.value.toLowerCase();
        const rows = document.querySelectorAll('#zoneTable tbody tr');

        rows.forEach(row => {
            const cells = row.querySelectorAll('td');
            const matches = Array.from(cells).some(cell => cell.textContent.toLowerCase().includes(searchTerm));
            row.style.display = matches ? '' : 'none';
        });
    });

    // Highlight row on hover
    document.querySelectorAll('#zoneTable tbody tr').forEach(row => {
        row.addEventListener('mouseenter', function() {
            this.style.backgroundColor = '#f2f2f2';
        });
        row.addEventListener('mouseleave', function() {
            this.style.backgroundColor = '';
        });
    });


</script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
    // Designation WISE Data using Group By
    const designationData = {
        labels: [
            {% for item in results %}
            "{{ item.trimmed_designation }}"{% if not forloop.last %},{% endif %}
            {% endfor %}
        ],
        datasets: [{
            label: 'Total Strength #',
            data: [
                {% for item in results %}
                {{ item.total }}{% if not forloop.last %},{% endif %}
                {% endfor %}
            ],
            backgroundColor: generateRandomColors({{ results|length }}),
            borderColor: 'rgba(0, 0, 0, 0.2)',
            borderWidth: 2

    };

    const designationChart = document.getElementById('designationChart').getContext('2d');
    new Chart(designationChart, {
        type: 'bar',
        data: designationData,
        options: {
            scales: {
                x: {
                    beginAtZero: true
                },
                y: {
                    beginAtZero: true
                }
            },
            animation: {
                duration: 1000, // Animation duration in ms
                easing: 'easeInOutBounce' // Easing effect
            }
        }
    });

    // Retirement ZONE WISE Data using Group By

    const counts = {{ counts|safe }};

    const retirementChart = document.getElementById('retirementChart').getContext('2d');

        type: {% if request.user.is_superuser == 1 %} 'bar' {% else %} 'doughnut' {% endif %},
        data: {
            labels: zones,
            datasets: [{
                label: '# of Retirements',
                data: counts.map(count => parseFloat(count)),
                backgroundColor: generateRandomColors(counts.length),
                borderColor: 'rgba(0, 0, 0, 0.2)',
                borderWidth: 2

        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',

                tooltip: {

            animation: {
                duration: 1500, // Animation duration in ms

    if (userType == 'True') {

                leaveSummary[zone].medical_leave.count,

                leaveSummary[zone].study_leave.count,

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: datasets
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                    },
                    title: {
                        display: true,
                        text: 'Leave Summary by Zone (Admin View)'
                    }
                },
                animation: {
                    duration: 1200, // Animation duration in ms
                    easing: 'easeOutBounce' // Easing effect
                },
                scales: {
                    x: {
                        beginAtZero: true
                    },
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    } else {
        // Employee-specific logic for doughnut chart
        console.log(leaveSummary)
        const chartData = {
            labels: ['Casual Leave', 'Earned Leave', 'Ex-Pakistan Leave', 'Medical Leave', 'Maternity Leave', 'Study Leave', 'Special Leave'],
            datasets: [{

                    leaveSummary.casual_leave.count,
                    leaveSummary.earned_leave.count,

                    leaveSummary.medical_leave.count,
                    leaveSummary.maternity_leave.count,
                    leaveSummary.study_leave.count,

    // Explanation Summary Data
const explanationSummary = {{ explanation_summary|safe }};
const exp_ctx = document.getElementById('expSummary').getContext('2d');

if (userType == 'True') {

            explanationSummary[zone].habitual_absentee.count,

            explanationSummary[zone].delay_explanation.count,
            explanationSummary[zone].leave_explanation.count,
            explanationSummary[zone].disciplinary.count
        ],
        backgroundColor: generateRandomColors(9)
    }));

    new Chart(exp_ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: datasets
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',
                },
                title: {
                    display: true,
                    text: 'Explanation Summary by Zone (Admin View)'
                }
            },
            animation: {
                duration: 1200, // Animation duration in ms
                easing: 'easeOutBounce' // Easing effect

                x: {
                    beginAtZero: true
                },
                y: {
                    beginAtZero: true
                }
            }
        }
    });
} else {
    // Employee-specific logic for doughnut chart
    const chartData = {
        labels: ['Unapproved Leave', 'Attendance Issue', 'Absent', 'Habitual Absentee', 'Performance', 'Misconduct Explanation', 'Delay Explanation', 'Leave Explanation', 'Disciplinary'],
        datasets: [{
            label: 'Explanation Count',
            data: [
                explanationSummary.unapproved_leave.count,
                explanationSummary.attendance_issue.count,
                explanationSummary.absent.count,
                explanationSummary.habitual_absentee.count,
                explanationSummary.performance.count,
                explanationSummary.misconduct_explanation.count,
                explanationSummary.delay_explanation.count,
                explanationSummary.leave_explanation.count,
                explanationSummary.disciplinary.count
            ],
            backgroundColor: generateRandomColors(9)
        }]
    };

    new Chart(exp_ctx, {
        type: 'bar',
        data: chartData,
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',
                },
                title: {
                    display: true,
                    text: 'Your Explanation Summary (Employee View)'
                }
            },
            animation: {
                duration: 1300, // Animation duration in ms
                easing: 'easeInOutCubic' // Easing effect
            }
        }
    });
}

    // Function to generate random colors
    function generateRandomColors(count) {
        const colors = [];
        for (let i = 0; i < count; i++) {
            const randomColor = 'rgba(' +
                Math.floor(Math.random() * 256) + ',' +
                Math.floor(Math.random() * 256) + ',' +
                Math.floor(Math.random() * 256) + ',' +
                '0.5)';
            colors.push(randomColor);
        }
        return colors;
    }
});

</script>



<script>
    var ctx = document.getElementById('transferChart').getContext('2d');

    // Retrieve the userType value from Django context
    var userType = '{{ request.user.is_superuser}}';
    console.log(userType);
    var labels, data;

    if (userType == 'True') {
         alert('hello');
        // If user is an admin
        labels = {{ transfer_posting_summary.zones|safe }}; // Zone names from Django context
        data = {{ transfer_posting_summary.total_transfers|safe }}; // Transfer counts from Django context
    } else {
        alert('False');
        // If user is a zone admin
        labels = {{ transfer_posting_summary.units|safe }}; // Unit names from Django context
        data = [];
        // Generate data from unit_counts
        var unitCounts = {{ transfer_posting_summary.unit_counts|safe }};
        for (var i = 0; i < labels.length; i++) {
            data.push(unitCounts[labels[i]] || 0); // Use 0 if unit not found in unit_counts
        }
    } else {
        // Handle cases where userType is neither 1 nor 2
        console.error('Unexpected userType value:', userType);
    }

    // Initialize the Chart.js chart
    var isUnitData = labels.length > 0 && labels[0].includes('Unit');
    var transferChart = new Chart(ctx, {
        type: isUnitData ? 'bar' : 'pie', // Choose the chart type based on data
        data: {
            labels: labels,
            datasets: [{
                label: isUnitData ? 'Total Transfers by Unit' : 'Total Transfers by Zone',
                data: data,
                backgroundColor: [
                    'rgba(75, 192, 192, 0.2)',
                    'rgba(153, 102, 255, 0.2)',
                    'rgba(255, 159, 64, 0.2)'
                ],
                borderColor: [
                    'rgba(75, 192, 192, 1)',
                    'rgba(153, 102, 255, 1)',
                    'rgba(255, 159, 64, 1)'
                ],
                borderWidth: 1
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>
